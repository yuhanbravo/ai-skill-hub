name: DeepSeek Code Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  deepseek-review-on-command:
    name: DeepSeek review on PR comment command
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/deepseek-review') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    steps:
      - name: DeepSeek Code Review
        uses: hustcer/deepseek-review@v1
        with:
          chat-token: ${{ secrets.CHAT_TOKEN }}
          watch-mention: "/deepseek-review"
          allowed-associations: "OWNER,MEMBER,COLLABORATOR"
          model: "deepseek-chat"
          temperature: 0.1
          max-length: 60000
          exclude-patterns: "*.lock,*.log,*.min.js,*.map,dist/**,build/**"
          sys-prompt: |
            You are a strict but helpful code reviewer.
            Focus only on logic errors, potential bugs, security issues, and obvious performance problems.
            Ignore style, formatting, or typos.
            Return your review as a JSON array:
            [
              {
                "path": "file/relative/path",
                "line": 42,
                "severity": "high|medium|low",
                "description": "problem description",
                "suggestion": "how to fix"
              }
            ]
            If no issues, return empty array [].
